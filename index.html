<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Placar de Voleibol</title>
    <style>
        /* Importação da fonte Digital 7-Segment e Outfit para textos */
        @import url('https://cdn.jsdelivr.net/npm/@fontsource/dseg7-classic/index.css');
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', Arial, sans-serif;
            user-select: none;
            background: #111;
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Container Principal para permitir rotação CSS */
        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }

        /* FALLBACK DE ROTAÇÃO: Se o dispositivo estiver em modo Retrato (vertical),
           nós forçamos a rotação de 90 graus para exibir o app deitado (horizontal) */
        @media (orientation: portrait) {
            body {
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                background: #111;
            }
            #app-container {
                width: 100vh;
                height: 100vw;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(90deg);
                transform-origin: center center;
                overflow: hidden;
            }
        }

        /* Variáveis de tamanho dinâmicas baseadas na orientação física */
        :root {
            --score-font: 'Outfit', sans-serif;
            --score-size: 48vh;   
            --name-size: 4.5vh;
            --tie-size: 50vh;     
            --tiro-size: 4vh;
            --bg-blue: #0055ff;
            --bg-red: #ff2222;
            --font-color: white;
        }

        @media (orientation: portrait) {
            :root {
                --score-size: 48vw;
                --name-size: 4.5vw;
                --tie-size: 50vw;
                --tiro-size: 4vw;
            }
        }

        /* --- TEMAS --- */

        /* Estilo Digital (7-Segmentos como o placar eletrônico clássico) */
        .theme-digital {
            --score-font: 'DSEG7 Classic', monospace;
            --bg-blue: #020715;  /* Preto azulado profundo */
            --bg-red: #150202;   /* Preto avermelhado profundo */
            --font-color: #ffffff; /* Segmentos ativos em branco brilhante */
        }
        
        .theme-digital #scoreboard {
            background: #000000;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }

        .theme-digital .score-card {
            width: 85%;
            height: 65%;
            max-width: 360px;
            max-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .theme-digital .team-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: var(--name-size);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .theme-digital #teamBlue .team-name {
            color: #3388ff;
            text-shadow: 0 0 10px rgba(0, 85, 255, 0.4);
        }

        .theme-digital #teamRed .team-name {
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 34, 34, 0.4);
        }

        .theme-digital #tieDisplay {
            background: #000000;
        }

        .theme-digital #tieDisplay .score-card {
            width: 80vw;
            height: 65vh;
            max-width: 480px;
            max-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (orientation: portrait) {
            .theme-digital #tieDisplay .score-card {
                width: 80vh;
                height: 65vw;
            }
        }

        .theme-digital .score-num {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .theme-digital .a {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Estilo Moderno (Glassmorphism & Neon) */
        .theme-modern {
            --score-font: 'Outfit', sans-serif;
            --bg-blue: #081125; /* Escuro tecnológico azul */
            --bg-red: #250808;  /* Escuro tecnológico vermelho */
            --font-color: #ffffff;
        }

        .theme-modern #scoreboard {
            background: radial-gradient(circle at center, #0e121d 0%, #05070a 100%);
        }

        .theme-modern .score-card {
            width: 85%;
            height: 65%;
            max-width: 360px;
            max-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .theme-modern .team-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #ffffff;
            font-size: var(--name-size);
            letter-spacing: 3px;
        }

        .theme-modern .score-num {
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .theme-modern #teamBlue .score-num {
            text-shadow: 0 0 15px rgba(0, 136, 255, 0.6), 0 0 30px rgba(0, 85, 255, 0.3);
        }

        .theme-modern #teamRed .score-num {
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6), 0 0 30px rgba(255, 34, 34, 0.3);
        }

        .theme-modern #tieDisplay {
            background: radial-gradient(circle at center, #0e121d 0%, #05070a 100%);
        }

        .theme-modern #tieDisplay .score-card {
            width: 80vw;
            height: 65vh;
            max-width: 480px;
            max-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (orientation: portrait) {
            .theme-modern #tieDisplay .score-card {
                width: 80vh;
                height: 65vw;
            }
        }

        .theme-modern .a {
            color: rgba(255, 255, 255, 0.4);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* --- ESTRUTURA GERAL DAS TELAS --- */

        #setup, #scoreboard {
            width: 100%;
            height: 100%;
        }

        /* Tela de Configuração */
        #setup {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #18181f;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            overflow-y: auto;
            position: relative;
        }

        #setup h1 {
            font-size: 2.2rem;
            margin: 0 0 25px 0;
            text-align: center;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .setup-section {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .setup-section h2 {
            font-size: 1.3rem;
            margin: 0 0 12px 0;
            color: #aaa;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .btn-group button {
            padding: 15px 35px;
            font-size: 1.8rem;
            font-weight: bold;
            background: #2a2a35;
            color: white;
            border: 2px solid #444;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-group button:active, .btn-group button:hover {
            background: #ff5500;
            border-color: #ff5500;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 85, 0, 0.3);
        }

        .theme-select-group {
            display: flex;
            gap: 20px;
        }

        .theme-btn {
            padding: 12px 30px;
            font-size: 1.3rem;
            background: #2a2a35;
            color: #aaa;
            border: 2px solid #444;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .theme-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        /* Créditos Discretos */
        .credits {
            position: absolute;
            bottom: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.22);
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* Tela do Placar */
        #scoreboard {
            display: none;
            flex-direction: row;
            position: relative;
        }

        .team {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
        }

        .team-name {
            position: absolute;
            top: 12%;
            text-align: center;
            z-index: 80;
            width: 100%;
            pointer-events: none;
        }

        #teamBlue { background-color: var(--bg-blue); }
        #teamRed  { background-color: var(--bg-red); }

        .team:active {
            filter: brightness(0.85);
        }

        .score-card-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1vh 0;
        }

        /* --- DISPLAY DIGITAL (COM SEGMENTOS DE FUNDO APAGADOS) --- */
        .score-num-container {
            position: relative;
            display: inline-block;
        }

        .score-num-bg {
            font-size: var(--score-size);
            font-family: var(--score-font);
            color: transparent; /* Invisível por padrão em outros temas */
            pointer-events: none;
            user-select: none;
            line-height: 0.95;
            text-align: center;
        }

        .theme-digital .score-num-bg {
            color: rgba(255, 255, 255, 0.035); /* Segmentos "apagados" discretos */
        }

        .score-num {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: var(--score-size);
            font-family: var(--score-font);
            color: var(--font-color);
            font-weight: bold;
            line-height: 0.95;
            user-select: none;
            text-align: center;
        }

        /* Banner de Fase do Jogo */
        .phase-banner {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .theme-digital .phase-banner {
            background: #050508;
            color: #00ff66; /* Verde LED clássico */
            border: 1px solid #222;
            font-family: 'Outfit', sans-serif;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.5);
        }

        .theme-modern .phase-banner {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Indicador do TIRO */
        .tiro-indicator {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: var(--tiro-size);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0.5vh;
            user-select: none;
        }

        .tiro-indicator.active {
            opacity: 1;
            transform: translateY(0);
            animation: pulse-tiro 1.2s infinite alternate;
        }

        @keyframes pulse-tiro {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.08); filter: brightness(1.3); }
        }

        .theme-digital .tiro-indicator {
            font-family: 'Outfit', sans-serif;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        .theme-modern .tiro-indicator {
            font-family: 'Outfit', sans-serif;
            color: #ff3333;
            text-shadow: 0 0 10px #ff2222, 0 0 20px #ff2222;
        }

        .theme-modern #teamBlue .tiro-indicator {
            color: #0088ff;
            text-shadow: 0 0 10px #0055ff, 0 0 20px #0055ff;
        }

        /* Tela de EMPATE */
        #tieDisplay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 50;
            flex-direction: row;
        }

        .tie-half {
            flex: 1;
            height: 100%;
            cursor: pointer;
            z-index: 51;
        }
        .theme-digital .tie-half:active { background: rgba(255,255,255,0.01); }
        .theme-modern .tie-half:active { background: rgba(255,255,255,0.03); }

        #tieDisplay .score-card-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 55;
            margin: 0;
            width: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tieNumber {
            font-size: var(--tie-size);
            font-family: var(--score-font);
            font-weight: bold;
            line-height: 0.95;
            white-space: nowrap;
            text-align: center;
        }

        .a {
            font-weight: 500;
        }

        .theme-digital .a {
            font-size: 1em;
            color: #ffffff;
        }

        .theme-modern .a {
            font-size: 0.7em;
            margin-left: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* --- INDICADOR DO ÚLTIMO PONTUADOR --- */
        .scorer-indicator {
            position: fixed;
            bottom: 3vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 130px;
            height: 44px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            pointer-events: none;
        }

        .scorer-indicator.active {
            opacity: 1;
        }

        .indicator-arrow {
            font-size: 24px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s ease;
            color: #fff;
        }

        /* Seta apontando pro Azul (Esquerda) */
        .scorer-indicator.blue-last {
            border-color: rgba(0, 85, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 85, 255, 0.2);
            background: rgba(0, 40, 120, 0.2);
        }
        .scorer-indicator.blue-last .indicator-arrow {
            transform: rotate(180deg) translateX(15px);
            color: #0088ff;
        }

        /* Seta apontando pro Vermelho (Direita) */
        .scorer-indicator.red-last {
            border-color: rgba(255, 34, 34, 0.4);
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.2);
            background: rgba(120, 15, 15, 0.2);
        }
        .scorer-indicator.red-last .indicator-arrow {
            transform: rotate(0deg) translateX(15px);
            color: #ff3333;
        }

        /* --- ANIMAÇÃO DE FLIP 3D --- */
        .score-card {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .score-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ativa a animação de flip na carta inteira */
        .score-card.flipping .score-card-inner {
            animation: flip-card-animation 0.3s ease-in-out forwards;
        }

        @keyframes flip-card-animation {
            0% {
                transform: rotateX(0deg);
            }
            50% {
                transform: rotateX(-90deg);
                filter: brightness(0.5);
            }
            100% {
                transform: rotateX(0deg);
            }
        }

        /* --- BANNER DE ANÚNCIO DE TIEBREAK (ZEROU) --- */
        .announcement-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 300;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .announcement-overlay.show {
            display: flex;
            opacity: 1;
        }

        .announcement-content {
            text-align: center;
            padding: 30px 50px;
            border-radius: 20px;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .announcement-overlay.show .announcement-content {
            transform: scale(1);
        }

        .theme-digital .announcement-content {
            background: #050508;
            border: 2px solid #222;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .theme-digital .announcement-content h2 {
            color: #ff3333;
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        .theme-digital .announcement-content p {
            font-size: 1.3rem;
            margin: 0;
            color: #bbb;
        }

        .theme-modern .announcement-content {
            background: rgba(10, 14, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .theme-modern .announcement-content h2 {
            color: #ffaa00;
            font-size: 3rem;
            text-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
            margin: 0 0 10px 0;
            font-weight: 900;
        }

        .theme-modern .announcement-content p {
            font-size: 1.4rem;
            margin: 0;
            color: #ccc;
        }

        /* --- BOTÕES FIXOS --- */
        #undoBtn, #fsBtn {
            position: fixed;
            z-index: 200;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        #undoBtn {
            display: none;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.5rem;
        }

        #fsBtn {
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 1.1rem;
        }

        /* Estilização dos Botões Fixos por Tema */
        .theme-digital #undoBtn, .theme-digital #fsBtn {
            background: #0a0a0f;
            border: 1px solid #333;
            color: #888;
        }
        .theme-digital #undoBtn:active, .theme-digital #fsBtn:active {
            background: #222;
            color: #fff;
            border-color: #555;
        }

        .theme-modern #undoBtn, .theme-modern #fsBtn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .theme-modern #undoBtn:active, .theme-modern #fsBtn:active {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.25);
        }

        /* --- MODAL DE VITÓRIA --- */
        #winnerModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 250;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
        }

        .winner-panel {
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 90%;
            width: 440px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transform: scale(0.9);
            animation: zoom-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zoom-in {
            to { transform: scale(1); }
        }

        .winner-btn {
            padding: 15px 35px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .theme-digital .winner-panel {
            background: #050508;
            border: 2px solid #222;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }
        .theme-digital .winner-panel h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }
        .theme-digital .winner-team {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .theme-digital .winner-btn {
            background: #111;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .theme-digital .winner-btn:active {
            background: #00ff66;
            color: #000;
            border-color: #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        .theme-modern .winner-panel {
            background: rgba(10, 14, 25, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }
        .theme-modern .winner-panel h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 2px;
        }
        .theme-modern .winner-team {
            font-size: 3.2rem;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .theme-modern .winner-btn {
            background: linear-gradient(135deg, #0055ff, #0022aa);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 85, 255, 0.4);
        }
        .theme-modern .winner-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0, 85, 255, 0.2);
        }

        /* Tempo de jogo no Modal de Vitória */
        .winner-time {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: -10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .theme-digital .winner-time {
            color: #00ff66;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.4);
        }
        .theme-modern .winner-time {
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <!-- Container geral do aplicativo (permite rotação unificada via CSS) -->
    <div id="app-container" class="theme-digital">

        <!-- Tela Inicial: Escolha do Limite e Estilo -->
        <div id="setup">
            <h1>Placar de Vôlei</h1>
            
            <div class="setup-section">
                <h2>Estilo do Placar:</h2>
                <div class="theme-select-group">
                    <button id="btnThemeRustic" class="theme-btn active" onclick="setTheme('digital')">Digital</button>
                    <button id="btnThemeModern" class="theme-btn" onclick="setTheme('modern')">Moderno</button>
                </div>
            </div>

            <div class="setup-section">
                <h2>Pontuação Máxima:</h2>
                <div class="btn-group">
                    <button onclick="startGame(12)">12</button>
                    <button onclick="startGame(15)">15</button>
                    <button onclick="startGame(18)">18</button>
                    <button onclick="startGame(21)">21</button>
                </div>
            </div>

            <!-- Créditos Discretos no Rodapé -->
            <div class="credits">Desenvolvido por Tiago Carvalho</div>
        </div>

        <!-- Tela do Placar -->
        <div id="scoreboard">
            <!-- Banner superior com a fase da partida -->
            <div id="phaseBanner" class="phase-banner">
                <span id="phaseLabel">PARTIDA NORMAL</span>
            </div>
            
            <div class="team" id="teamBlue" onclick="addPoint('blue')">
                <div class="team-name">Azul</div>
                <div class="score-card-wrapper">
                    <div class="score-card" id="cardBlue">
                        <div class="score-card-inner">
                            <div class="score-num-container">
                                <div class="score-num-bg" id="scoreBlueBg">8</div>
                                <div class="score-num" id="scoreBlue">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tiro-indicator" id="tiroBlue">TIRO</div>
            </div>
            
            <div class="team" id="teamRed" onclick="addPoint('red')">
                <div class="team-name">Vermelho</div>
                <div class="score-card-wrapper">
                    <div class="score-card" id="cardRed">
                        <div class="score-card-inner">
                            <div class="score-num-container">
                                <div class="score-num-bg" id="scoreRedBg">8</div>
                                <div class="score-num" id="scoreRed">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tiro-indicator" id="tiroRed">TIRO</div>
            </div>

            <!-- Indicador Seta de Último Pontuador -->
            <div id="scorerIndicator" class="scorer-indicator">
                <div class="indicator-arrow">➔</div>
            </div>
        </div>

        <!-- Tela de Empate (sobrepõe o placar) -->
        <div id="tieDisplay">
            <!-- Banner superior na tela de empate também -->
            <div class="phase-banner" style="position: absolute; z-index: 60; top: 15px;">
                <span id="phaseLabelTie">PARTIDA NORMAL</span>
            </div>

            <div class="tie-half" onclick="addPoint('blue')"></div>
            <div class="tie-half" onclick="addPoint('red')"></div>
            
            <div class="score-card-wrapper">
                <div class="score-card" id="cardTie">
                    <div class="score-card-inner">
                        <div class="score-num-container">
                            <div class="score-num-bg" id="tieNumberBg">88</div>
                            <div class="score-num" id="tieNumber">0<span class="a">A</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botão desfazer -->
        <button id="undoBtn" onclick="undo()" title="Desfazer">&#8634;</button>

        <!-- Botão tela cheia -->
        <button id="fsBtn" onclick="toggleFullscreen()" title="Tela cheia">&#9974;</button>

        <!-- Modal de Vitória -->
        <div id="winnerModal">
            <div class="winner-panel">
                <h1 id="winnerTitle">VITÓRIA!</h1>
                <div class="winner-team" id="winnerMessage">AZUL</div>
                <div class="winner-time" id="winnerTime">Tempo de Jogo: 00:00</div>
                <button class="winner-btn" onclick="goBack()">Novo Jogo</button>
            </div>
        </div>

        <!-- Banner de anúncio temporário (Tiro/Resets) -->
        <div id="announcementOverlay" class="announcement-overlay">
            <div class="announcement-content">
                <h2 id="announcementTitle">TIRO A TIRO!</h2>
                <p id="announcementText">O placar zerou! Começa a Melhor de 2.</p>
            </div>
        </div>

    </div>

    <script>
        // --- ESTADOS DO JOGO ---
        let scoreA = 0;             // Pontos Azul
        let scoreB = 0;             // Pontos Vermelho
        let maxScore = 15;          // Limite selecionado (12, 15, 18, 21)
        let gameActive = false;     // Se o jogo está rolando
        let pointHistory = [];      // Guarda histórico de estados completo para Desfazer
        let scoreboardStyle = 'digital'; // 'digital' ou 'modern'
        let lastScorer = null;      // Último a marcar ('blue', 'red', null)
        
        // Fases: 'normal' | 'melhor_de_2_1' | 'melhor_de_2_2' | 'melhor_de_3'
        let phase = 'normal';       
        
        let wakeLock = null;
        let audioCtx = null;

        // --- CONTROLE DE TEMPO DE PARTIDA ---
        let matchStartTime = null;
        let matchTimerInterval = null;
        let currentTimerStr = "00:00";

        function updateMatchTimer() {
            if (!matchStartTime) return;
            const elapsed = Math.floor((Date.now() - matchStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            currentTimerStr = `${minutes}:${seconds}`;
            
            if (gameActive) {
                updateDisplayBanner();
            }
        }

        function updateDisplayBanner() {
            let phaseText = "PARTIDA NORMAL";
            if (phase === 'melhor_de_2_1' || phase === 'melhor_de_2_2') {
                phaseText = "MELHOR DE 2";
            } else if (phase === 'melhor_de_3') {
                phaseText = "MELHOR DE 3";
            }
            
            const fullText = `${phaseText} • ${currentTimerStr}`;
            document.getElementById('phaseLabel').innerText = fullText;
            document.getElementById('phaseLabelTie').innerText = fullText;
        }

        // --- SISTEMA DE ÁUDIO SINTETIZADO ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Sintetiza um clique físico / claque mecânico ao virar a aba do placar
        function playClickSound() {
            initAudio();
            if (!audioCtx) return;
            try {
                // Buffer de ruído branco de 35ms
                const bufferSize = audioCtx.sampleRate * 0.035;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                // Envelope do ruído
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                
                // Filtro passa-banda para dar textura plástica/madeira
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1100;
                filter.Q.value = 2.5;
                
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                // Componente grave rápido (senoidal) para dar peso físico ao clique
                const osc = audioCtx.createOscillator();
                const oscGain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(130, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.015);
                
                oscGain.gain.setValueAtTime(0.07, audioCtx.currentTime);
                oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.015);
                
                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                
                noise.start();
                osc.start();
                noise.stop(audioCtx.currentTime + 0.035);
                osc.stop(audioCtx.currentTime + 0.035);
            } catch (e) {
                console.log("Falha ao reproduzir áudio:", e);
            }
        }

        // Sintetiza um som de aviso/sineta ascendente para momentos especiais (zera/empate)
        function playChimeSound() {
            initAudio();
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                
                const playNote = (freq, time, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, time);
                    
                    gain.gain.setValueAtTime(0.08, time);
                    gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.02);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(time);
                    osc.stop(time + duration);
                };
                
                playNote(261.63, now, 0.15);       // Do4
                playNote(329.63, now + 0.08, 0.15); // Mi4
                playNote(392.00, now + 0.16, 0.3);  // Sol4
            } catch(e) {}
        }

        // --- SISTEMA DE TEMAS ---
        function setTheme(theme) {
            scoreboardStyle = theme;
            const container = document.getElementById('app-container');
            const btnRustic = document.getElementById('btnThemeRustic');
            const btnModern = document.getElementById('btnThemeModern');
            
            if (theme === 'digital') {
                container.classList.remove('theme-modern');
                container.classList.add('theme-digital');
                btnRustic.classList.add('active');
                btnModern.classList.remove('active');
            } else {
                container.classList.remove('theme-digital');
                container.classList.add('theme-modern');
                btnModern.classList.add('active');
                btnRustic.classList.remove('active');
            }
            updateDisplay(false); // Força atualização sem animação para aplicar o visual de fundo correto dos segmentos
        }

        // --- LÓGICA DE JOGO ---
        function startGame(points) {
            maxScore = points;
            scoreA = 0;
            scoreB = 0;
            phase = 'normal';
            lastScorer = null;
            pointHistory = [];
            gameActive = true;
            
            // Inicializa e inicia o cronômetro
            matchStartTime = Date.now();
            currentTimerStr = "00:00";
            if (matchTimerInterval) clearInterval(matchTimerInterval);
            matchTimerInterval = setInterval(updateMatchTimer, 1000);
            
            updateDisplay(false);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('scoreboard').style.display = 'flex';
            document.getElementById('winnerModal').style.display = 'none';
            document.getElementById('undoBtn').style.display = 'flex';

            requestWakeLock();
            initAudio();

            // Histórico para botão físico voltar funcionar no celular
            history.pushState({ page: 'scoreboard' }, 'Placar', '#placar');
        }

        // Altera o valor de uma carta com efeito flip 3D e atualiza segmentos apagados
        function setCardValue(cardId, elementId, bgElementId, newValue, animate = true) {
            const card = document.getElementById(cardId);
            const elem = document.getElementById(elementId);
            const bgElem = document.getElementById(bgElementId);
            
            if (!card || !elem) {
                if (elem) elem.innerHTML = newValue;
                return;
            }

            // Calcula o texto de fundo do 7-segmentos (gera '8' para cada dígito ativo)
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = newValue;
            const rawText = tempDiv.textContent || tempDiv.innerText || "";
            const bgValue = '8'.repeat(rawText.length);
            
            if (animate) {
                playClickSound();
                card.classList.remove('flipping');
                void card.offsetWidth; // Força reflow no navegador
                card.classList.add('flipping');
                
                // Altera o número exatamente na metade do giro (quando está invisível de lado)
                setTimeout(() => {
                    elem.innerHTML = newValue;
                    if (bgElem) bgElem.innerHTML = bgValue;
                }, 150);
            } else {
                elem.innerHTML = newValue;
                if (bgElem) bgElem.innerHTML = bgValue;
            }
        }

        // Exibe um alerta visual com texto no meio da tela
        function showAnnouncement(title, text) {
            const overlay = document.getElementById('announcementOverlay');
            const titleEl = document.getElementById('announcementTitle');
            const textEl = document.getElementById('announcementText');
            
            titleEl.innerText = title;
            textEl.innerText = text;
            
            overlay.style.display = 'flex';
            void overlay.offsetWidth; // Força reflow
            overlay.classList.add('show');
            
            playChimeSound();
            
            setTimeout(() => {
                overlay.classList.remove('show');
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300);
            }, 2000);
        }

        // Adiciona ponto para um dos times e gerencia o fluxo de empates e resets
        function addPoint(team) {
            if (!gameActive) return;

            // Salva o estado atual para permitir desfazer completo
            pointHistory.push({
                scoreA: scoreA,
                scoreB: scoreB,
                phase: phase,
                lastScorer: lastScorer,
                gameActive: gameActive
            });

            if (team === 'blue') {
                scoreA++;
                lastScorer = 'blue';
            } else if (team === 'red') {
                scoreB++;
                lastScorer = 'red';
            } else {
                return;
            }

            // Descobre o limite atual da pontuação da fase activa
            let target = maxScore;
            if (phase === 'melhor_de_2_1' || phase === 'melhor_de_2_2') {
                target = 2;
            } else if (phase === 'melhor_de_3') {
                target = 3;
            }

            const tiroScore = target - 1;

            // CASO: Empate no Tiro (Ambos atingem o limite - 1) -> Placar zera e entra na Melhor de 2/3
            if (scoreA === tiroScore && scoreB === tiroScore) {
                scoreA = 0;
                scoreB = 0;
                
                let title = "TIRO A TIRO!";
                let subtitle = "";
                
                if (phase === 'normal') {
                    phase = 'melhor_de_2_1';
                    subtitle = `Empate em ${tiroScore}x${tiroScore}! Placar zerou: Melhor de 2.`;
                } else if (phase === 'melhor_de_2_1') {
                    phase = 'melhor_de_2_2';
                    subtitle = "Empate em 1x1! Placar zerou: Melhor de 2 dnv.";
                } else if (phase === 'melhor_de_2_2') {
                    phase = 'melhor_de_3';
                    title = "MELHOR DE 3!";
                    subtitle = "Tiro a tiro dnv! Placar zerou: Melhor de 3.";
                } else if (phase === 'melhor_de_3') {
                    phase = 'melhor_de_2_1';
                    subtitle = "Empate em 2x2! Placar zerou: volta para Melhor de 2.";
                }
                
                showAnnouncement(title, subtitle);
                afterChange(false); // atualiza displays de forma direta (sem animação de flip ao zerar)
                return;
            }

            // CASO: Vitória na fase ativa
            if (scoreA >= target || scoreB >= target) {
                gameActive = false;
                afterChange(true);
                return;
            }

            afterChange(true);
        }

        // Desfaz o último ponto jogado
        function undo() {
            if (pointHistory.length === 0) return;
            const prevState = pointHistory.pop();
            
            scoreA = prevState.scoreA;
            scoreB = prevState.scoreB;
            phase = prevState.phase;
            lastScorer = prevState.lastScorer;
            gameActive = prevState.gameActive;
            
            afterChange(false); // atualiza tela diretamente (sem animar) ao desfazer
        }

        // Processa as mudanças do placar
        function afterChange(animate = true) {
            updateDisplay(animate);

            let target = maxScore;
            if (phase === 'melhor_de_2_1' || phase === 'melhor_de_2_2') {
                target = 2;
            } else if (phase === 'melhor_de_3') {
                target = 3;
            }

            if (scoreA >= target || scoreB >= target) {
                gameActive = false;
                if (matchTimerInterval) {
                    clearInterval(matchTimerInterval);
                    matchTimerInterval = null;
                }
                const blueWon = scoreA >= target;
                showWinner(blueWon ? "AZUL" : "VERMELHO", blueWon ? "#0055ff" : "#ff2222");
            } else {
                // Se um undo restaurou o estado ativo do jogo
                if (pointHistory.length === 0 || pointHistory[pointHistory.length - 1].gameActive) {
                    gameActive = true;
                    document.getElementById('winnerModal').style.display = 'none';
                    // Reinicia o cronômetro caso estivesse parado
                    if (!matchTimerInterval) {
                        matchTimerInterval = setInterval(updateMatchTimer, 1000);
                    }
                }
            }
        }

        // --- ATUALIZAÇÃO DA TELA ---
        function updateDisplay(animate = true) {
            const tie = document.getElementById('tieDisplay');
            
            // Define o rótulo de fase legível com o cronômetro
            updateDisplayBanner();

            // Determina a pontuação de Tiro da fase atual
            let target = maxScore;
            if (phase === 'melhor_de_2_1' || phase === 'melhor_de_2_2') {
                target = 2;
            } else if (phase === 'melhor_de_3') {
                target = 3;
            }
            const tiroScore = target - 1;

            // Verifica status de TIRO para cada time (exclusivo para quem está na frente)
            const blueTiro = (scoreA === tiroScore && scoreB < tiroScore);
            const redTiro = (scoreB === tiroScore && scoreA < tiroScore);
            
            const indicatorBlue = document.getElementById('tiroBlue');
            const indicatorRed = document.getElementById('tiroRed');

            if (blueTiro) indicatorBlue.classList.add('active');
            else indicatorBlue.classList.remove('active');

            if (redTiro) indicatorRed.classList.add('active');
            else indicatorRed.classList.remove('active');

            // Atualiza a seta do último pontuador
            const arrow = document.getElementById('scorerIndicator');
            if (lastScorer === 'blue') {
                arrow.className = 'scorer-indicator active blue-last';
            } else if (lastScorer === 'red') {
                arrow.className = 'scorer-indicator active red-last';
            } else {
                arrow.className = 'scorer-indicator';
            }

            // Lógica de exibição de EMPATE vs PLACAR SEPARADO
            if (scoreA === scoreB && gameActive) {
                // Configura o texto de empate
                const tieContent = scoreA + '<span class="a">A</span>';
                setCardValue('cardTie', 'tieNumber', 'tieNumberBg', tieContent, animate);
                
                // Atualiza em background os placares escondidos
                setCardValue('cardBlue', 'scoreBlue', 'scoreBlueBg', scoreA, false);
                setCardValue('cardRed', 'scoreRed', 'scoreRedBg', scoreB, false);
                
                tie.style.display = 'flex';
            } else {
                tie.style.display = 'none';
                // Anima apenas o número do time que acabou de pontuar
                setCardValue('cardBlue', 'scoreBlue', 'scoreBlueBg', scoreA, animate && lastScorer === 'blue');
                setCardValue('cardRed', 'scoreRed', 'scoreRedBg', scoreB, animate && lastScorer === 'red');
            }
        }

        // Exibe o modal de vitória adaptando ao estilo selecionado
        function showWinner(teamName, color) {
            const modal = document.getElementById('winnerModal');
            const msg = document.getElementById('winnerMessage');
            
            msg.innerText = "TIME " + teamName;
            msg.style.color = color;
            
            // Define o tempo final no modal
            document.getElementById('winnerTime').innerText = "Tempo de jogo: " + currentTimerStr;
            
            const panel = document.querySelector('.winner-panel');
            if (scoreboardStyle === 'modern') {
                msg.style.textShadow = `0 0 15px ${color}, 0 0 30px ${color}`;
                panel.style.boxShadow = `0 0 50px ${color}44, inset 0 0 20px rgba(255, 255, 255, 0.05)`;
            } else {
                msg.style.textShadow = '0 0 15px rgba(255, 255, 255, 0.2)';
                panel.style.boxShadow = '0 20px 50px rgba(0,0,0,0.6)';
            }
            
            document.getElementById('tieDisplay').style.display = 'none';
            modal.style.display = 'flex';
        }

        function goBack() {
            if (document.getElementById('scoreboard').style.display === 'flex') {
                history.back();
            } else {
                resetToSetup();
            }
        }

        function resetToSetup() {
            gameActive = false;
            pointHistory = [];
            lastScorer = null;
            
            // Limpa o cronômetro
            if (matchTimerInterval) {
                clearInterval(matchTimerInterval);
                matchTimerInterval = null;
            }
            
            releaseWakeLock();
            document.getElementById('setup').style.display = 'flex';
            document.getElementById('scoreboard').style.display = 'none';
            document.getElementById('tieDisplay').style.display = 'none';
            document.getElementById('winnerModal').style.display = 'none';
            document.getElementById('undoBtn').style.display = 'none';
        }

        // Escuta o botão físico voltar do Android/Telemóvel
        window.addEventListener('popstate', function () {
            resetToSetup();
        });

        // --- SISTEMA WAKELOCK (MANTÉM TELA ACESA) ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (e) {}
        }
        function releaseWakeLock() {
            try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {}
        }
        document.addEventListener('visibilitychange', function () {
            if (wakeLock !== null && document.visibilityState === 'visible' && gameActive) {
                requestWakeLock();
            }
        });

        // --- MODO TELA CHEIA & TRAVA ORIENTAÇÃO NATIVA ---
        async function toggleFullscreen() {
            const el = document.documentElement;
            const isFull = document.fullscreenElement || document.webkitFullscreenElement;
            try {
                if (!isFull) {
                    if (el.requestFullscreen) {
                        await el.requestFullscreen();
                    } else if (el.webkitRequestFullscreen) {
                        await el.webkitRequestFullscreen();
                    }
                    // Tenta travar em paisagem se suportado pelo navegador nativamente
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape').catch(() => {});
                    }
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        await document.webkitExitFullscreen();
                    }
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                }
            } catch (e) {
                console.log(e);
            }
        }

        function updateFsIcon() {
            const isFull = document.fullscreenElement || document.webkitFullscreenElement;
            document.getElementById('fsBtn').innerHTML = isFull ? '&#10006;' : '&#9974;';
        }
        document.addEventListener('fullscreenchange', updateFsIcon);
        document.addEventListener('webkitfullscreenchange', updateFsIcon);
        
        // Inicia o app com o tema digital selecionado por padrão
        setTheme('digital');
    </script>
</body>
</html>
