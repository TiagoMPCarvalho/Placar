<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Content Security Policy para proteção contra invasões/XSS -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self'; img-src 'self' data:;">
    <meta name="description" content="Placar de Vôlei Digital e Moderno de alta fidelidade para telemóveis e tablets.">
    <title>Placar de Vôlei</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Container geral do aplicativo -->
    <div id="app-container" class="theme-digital">

        <!-- Tela Inicial: Escolha do Limite e Estilo -->
        <div id="setup">
            <h1>Placar de Vôlei</h1>
            


            <div class="setup-section">
                <h2>Combinação de Cores:</h2>
                <div class="color-select-group">
                    <button class="color-preset-btn active" data-preset="principal">Principal</button>
                    <button class="color-preset-btn" data-preset="escuro">Escuro</button>
                    <button class="color-preset-btn" data-preset="custom">Personalizado...</button>
                </div>
                
                <!-- Seletores de cores personalizadas -->
                <div id="customColorSelectors" class="custom-color-selectors" style="display: none;">
                    <div class="color-picker-item">
                        <input type="color" id="customColorLeft" value="#0000ff">
                    </div>
                    <div class="color-picker-item">
                        <input type="color" id="customColorRight" value="#ff0000">
                    </div>
                </div>
            </div>

            <div class="setup-section">
                <h2>Pontuação Máxima:</h2>
                <div class="btn-group">
                    <button class="btn-start-score" data-points="12">12</button>
                    <button class="btn-start-score" data-points="15">15</button>
                    <button class="btn-start-score" data-points="18">18</button>
                    <button class="btn-start-score" data-points="21">21</button>
                </div>
            </div>

            <!-- Créditos Discretos no Rodapé -->
            <div class="credits">Desenvolvido por Tiago Carvalho</div>
        </div>

        <!-- Tela do Placar -->
        <div id="scoreboard">
            <!-- Banner superior com a fase da partida -->
            <div id="phaseBanner" class="phase-banner">
                <span id="phaseLabel">PARTIDA NORMAL</span>
            </div>
            
            <div class="team" id="teamBlue">
                <div class="score-card-wrapper">
                    <div class="score-card" id="cardBlue">
                        <div class="score-card-inner">
                            <div class="score-num-container">
                                <div class="score-num-bg" id="scoreBlueBg">8</div>
                                <div class="score-num" id="scoreBlue">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tiro-indicator" id="tiroBlue">TIRO</div>
            </div>
            
            <div class="team" id="teamRed">
                <div class="score-card-wrapper">
                    <div class="score-card" id="cardRed">
                        <div class="score-card-inner">
                            <div class="score-num-container">
                                <div class="score-num-bg" id="scoreRedBg">8</div>
                                <div class="score-num" id="scoreRed">0</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tiro-indicator" id="tiroRed">TIRO</div>
            </div>

            <!-- Indicador Seta de Último Pontuador -->
            <div id="scorerIndicator" class="scorer-indicator">
                <div class="indicator-arrow">➔</div>
            </div>
        </div>

        <!-- Tela de Empate (sobrepõe o placar) -->
        <div id="tieDisplay">
            <!-- Banner superior na tela de empate também -->
            <div id="phaseBannerTie" class="phase-banner">
                <span id="phaseLabelTie">PARTIDA NORMAL</span>
            </div>

            <div class="tie-half" id="tieHalfBlue"></div>
            <div class="tie-half" id="tieHalfRed"></div>
            
            <div class="score-card-wrapper">
                <div class="score-card" id="cardTie">
                    <div class="score-card-inner">
                        <div class="score-num-container">
                            <div class="score-num-bg" id="tieNumberBg">88</div>
                            <div class="score-num" id="tieNumber">0<span class="a">A</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botão desfazer -->
        <button id="undoBtn" title="Desfazer">&#8634;</button>

        <!-- Botão tela cheia -->
        <button id="fsBtn" title="Tela cheia">&#9974;</button>

        <!-- Botão de bloqueio de tela (Cadeado) -->
        <button id="lockBtn" title="Bloquear/Desbloquear tela">&#128275;</button>

        <!-- Mensagem de dica do cadeado -->
        <div id="lockHint" class="lock-hint">Toque duplo para marcar</div>

        <!-- Modal de Vitória -->
        <div id="winnerModal">
            <div class="winner-panel">
                <h1 id="winnerTitle">VITÓRIA!</h1>
                <div class="winner-team" id="winnerMessage">AZUL</div>
                <div class="winner-time" id="winnerTime">Tempo de Jogo: 00:00</div>
                <button class="winner-btn" id="newGameBtn">Novo Jogo</button>
            </div>
        </div>

        <!-- Overlay do Manual de Clique -->
        <div id="manualOverlay" class="manual-overlay">
            <div class="manual-content-wrapper">
                <!-- Ponto de clique esquerdo -->
                <div class="tap-pointer left-pointer" id="leftPointer">
                    <div class="tap-circle"></div>
                    <div class="tap-ring"></div>
                </div>
                <!-- Ponto de clique direito -->
                <div class="tap-pointer right-pointer" id="rightPointer">
                    <div class="tap-circle"></div>
                    <div class="tap-ring"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="index.js" defer></script>
</body>
</html>
